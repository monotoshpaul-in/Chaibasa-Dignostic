<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="100%" height="100%">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B4A8B" />
      <stop offset="100%" stop-color="#17A89A" />
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#17A89A" />
      <stop offset="100%" stop-color="#0B4A8B" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0B4A8B" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Logo Emblem -->
  <g transform="translate(10, 10)" filter="url(#softGlow)">
    <!-- Outer Shield / Circle -->
    <rect x="0" y="0" width="100" height="100" rx="28" fill="url(#brandGrad)" />
    
    <!-- Pulse Heart Line & Medical Cross -->
    <!-- Cross vertical -->
    <rect x="43" y="24" width="14" height="52" rx="7" fill="#FFFFFF" opacity="0.95" />
    <!-- Cross horizontal -->
    <rect x="24" y="43" width="52" height="14" rx="7" fill="#FFFFFF" opacity="0.95" />
    
    <!-- Heartbeat ECG line accent -->
    <path d="M 20 50 L 35 50 L 42 32 L 50 68 L 58 40 L 64 54 L 70 50 L 80 50" 
          fill="none" 
          stroke="#17A89A" 
          stroke-width="4.5" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
          
    <circle cx="50" cy="50" r="4" fill="#FFFFFF" />
  </g>

  <!-- Brand Typography -->
  <!-- Main Title -->
  <text x="130" y="52" font-family="'Poppins', 'Inter', sans-serif" font-weight="700" font-size="30" fill="#0B4A8B" letter-spacing="-0.5">
    NEW LIFE
  </text>
  
  <text x="270" y="52" font-family="'Poppins', 'Inter', sans-serif" font-weight="400" font-size="24" fill="#17A89A" letter-spacing="0">
    DIAGNOSTIC
  </text>

  <!-- Subtitle -->
  <text x="130" y="78" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#1B2430" letter-spacing="1.5" opacity="0.85">
    &amp; MULTISPECIALITY POLYCLINIC
  </text>
  
  <!-- Tagline -->
  <text x="130" y="98" font-family="'Inter', sans-serif" font-weight="500" font-size="12" fill="#17A89A" letter-spacing="0.5">
    Your Health, Our Priority • Chaibasa
  </text>
</svg>
